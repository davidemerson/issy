name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ZIG_VERSION: "0.15.2"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ~/zig
          key: zig-x86_64-linux-${{ env.ZIG_VERSION }}

      - name: Install Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          curl -L -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          mkdir -p ~/zig
          tar xf zig.tar.xz -C ~/zig --strip-components=1

      - name: Add Zig to PATH
        run: echo "$HOME/zig" >> $GITHUB_PATH

      - name: Unit tests
        run: zig build test

      - name: Build
        run: zig build

      - name: Smoke-test macOS cross-compile
        run: |
          zig build -Dtarget=aarch64-macos -Doptimize=ReleaseSafe
          zig build -Dtarget=x86_64-macos -Doptimize=ReleaseSafe

      - name: Integration tests
        run: |
          sudo apt-get install -y -qq expect
          bash tests/run_tests.sh

  # Real OpenBSD smoke test — boots a 7.8 amd64 VM via QEMU/KVM and
  # runs the full unit + integration suite on it.  Catches OpenBSD-only
  # regressions like std.fs.Dir.realpath being unsupported, raw-syscall
  # SIGKILL traps, and pkg_add fallout from zig version drift.  Cannot
  # be replicated by Linux cross-compile because Zig doesn't ship
  # OpenBSD libc headers and OpenBSD requires libc for any process
  # surviving past startup.
  openbsd-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Build and test on OpenBSD 7.8
        uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: openbsd
          version: '7.8'
          architecture: x86-64
          memory: 4G
          cpu_count: 2
          shell: bash
          # cross-platform-actions/action rsyncs the workspace to the VM
          # before `run`, then rsyncs back after, so anything we drop in
          # the workspace (including the built binary) ends up on the
          # runner.  We exploit that to publish the binary as a CI
          # artifact for the release job to pick up — Linux can't
          # cross-compile to OpenBSD because Zig doesn't ship OpenBSD
          # libc headers.
          run: |
            set -euxo pipefail
            # cross-platform-actions/action's OpenBSD image runs as user
            # `runner` with sudo (not doas) configured for pkg_add.
            sudo pkg_add -I bash rsync-- expect zig
            uname -a
            zig version
            zig build -Doptimize=ReleaseSafe
            zig build test --summary all
            ./zig-out/bin/issy --version
            ./zig-out/bin/issy --help
            bash tests/run_tests.sh
      - name: Stage OpenBSD binary for release
        run: |
          mkdir -p openbsd-dist
          cp zig-out/bin/issy openbsd-dist/issy-openbsd-amd64
          chmod +x openbsd-dist/issy-openbsd-amd64
          file openbsd-dist/issy-openbsd-amd64
      - name: Upload OpenBSD binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: issy-openbsd-amd64
          path: openbsd-dist/issy-openbsd-amd64
          if-no-files-found: error
          retention-days: 7

  # Real macOS runtime test.  The ubuntu-based `test` job cross-compiles
  # to macOS but never executes the resulting Mach-O.  This job runs
  # the unit + integration suite on a real macOS arm64 host, catching
  # macOS-only behaviour differences (Darwin symlink handling,
  # F_GETPATH vs /proc fallbacks, Apple Silicon PIE, etc.).
  macos-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        run: |
          set -eux
          arch=$(uname -m)
          case "$arch" in
            arm64)  zig_arch=aarch64 ;;
            x86_64) zig_arch=x86_64 ;;
            *)      echo "unsupported arch: $arch"; exit 1 ;;
          esac
          curl -L -o zig.tar.xz \
            "https://ziglang.org/download/${ZIG_VERSION}/zig-${zig_arch}-macos-${ZIG_VERSION}.tar.xz"
          mkdir -p ~/zig
          tar xf zig.tar.xz -C ~/zig --strip-components=1
          echo "$HOME/zig" >> $GITHUB_PATH
      - name: Zig info
        run: zig version && zig env
      - name: Unit tests
        run: zig build test --summary all
      - name: Build ReleaseSafe
        run: zig build -Doptimize=ReleaseSafe
      - name: Smoke-test binary
        run: |
          ./zig-out/bin/issy --version
          ./zig-out/bin/issy --help
      - name: Install a TTF for PDF export test
        # macOS ships /System/Library/Fonts/Menlo.ttc but our PDF
        # writer doesn't unpack TTC collections. Drop a real TTF at
        # the path t14_pdf.exp looks for so the PDF export path is
        # actually exercised (rather than silently skipped).
        run: |
          curl -fsSL -o /tmp/issy-test-font.ttf \
            https://github.com/JetBrains/JetBrainsMono/raw/master/fonts/ttf/JetBrainsMono-Regular.ttf
          ls -l /tmp/issy-test-font.ttf
          file /tmp/issy-test-font.ttf
      - name: Integration tests
        # expect ships with macOS
        run: bash tests/run_tests.sh

  # Verify the Homebrew formula actually builds from HEAD via the
  # same path Mac users take (`brew install --HEAD issy`).  This
  # catches formula syntax errors, zig@0.15 pinning drift, the Xcode
  # SDK path issues we've already hit twice (see 69f0d8e, 1c16df0),
  # AND whether `bin.install` / `man1.install` actually land in a
  # place where `issy --version` runs and `man issy` finds the page.
  # Runs on macos-latest so zig@0.15 resolves to a real bottle.
  homebrew-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tap the checked-out repo as a local Homebrew tap
        # `brew install --HEAD` requires the formula to be available
        # through a tap.  Symlink the workspace into
        # Library/Taps/davidemerson/homebrew-issy so brew treats it
        # like a real tap.
        run: |
          set -eux
          tap_dir="$(brew --repository)/Library/Taps/davidemerson/homebrew-issy"
          mkdir -p "$(dirname "$tap_dir")"
          ln -sfn "$GITHUB_WORKSPACE" "$tap_dir"
          brew tap-info davidemerson/issy
      - name: brew install --HEAD davidemerson/issy/issy
        run: brew install -v --HEAD davidemerson/issy/issy
      - name: Verify installed binary
        run: |
          set -eux
          which issy
          issy --version
          issy --help | head -3
      - name: Verify installed manpage
        # This is the thing that was reportedly not updating.  Check
        # both that the file exists and that `man` actually renders it
        # — a symlink pointing at a missing file would pass the first
        # but fail the second.  Also grep for strings that only exist
        # in the rewritten page, to catch the case where a stale page
        # from a prior install is shadowing the new one.
        #
        # man(1) renders bold via backspace-overstrike (S\bS\bh\bh...),
        # so we pipe through `col -b` to strip that before grepping.
        run: |
          set -eux
          # Where did brew install it?
          man_path="$(man -w issy)"
          echo "Manpage path: $man_path"
          test -s "$man_path"
          file "$man_path"
          # Render, strip overstrike, and spot-check content that only
          # exists post-rewrite
          man issy 2>&1 | col -b > /tmp/rendered-man.txt
          head -20 /tmp/rendered-man.txt
          grep -q 'Shift+Home' /tmp/rendered-man.txt
          grep -q 'Triple-click' /tmp/rendered-man.txt
          grep -q 'EXIT STATUS' /tmp/rendered-man.txt

  release:
    needs: [test, openbsd-test, macos-test, homebrew-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ~/zig
          key: zig-x86_64-linux-${{ env.ZIG_VERSION }}

      - name: Install Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          curl -L -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          mkdir -p ~/zig
          tar xf zig.tar.xz -C ~/zig --strip-components=1

      - name: Add Zig to PATH
        run: echo "$HOME/zig" >> $GITHUB_PATH

      - name: Build Linux targets
        run: |
          mkdir -p dist

          declare -A names
          names[x86_64-linux-gnu]="issy-linux-amd64"
          names[aarch64-linux-gnu]="issy-linux-arm64"

          # macOS is intentionally omitted: cross-compiled Mach-O from Linux
          # has no LC_CODE_SIGNATURE and is rejected by the Apple Silicon
          # kernel. Mac users install via `brew install --HEAD davidemerson/issy/issy`
          # or build from source with `zig build`.
          # OpenBSD also can't be cross-compiled from Linux (Zig doesn't
          # ship OpenBSD libc headers); the binary comes from the
          # openbsd-test job's artifact, downloaded in the next step.
          for target in x86_64-linux-gnu aarch64-linux-gnu; do
            echo "::group::Building $target"
            if zig build -Dtarget=$target -Doptimize=ReleaseSafe; then
              cp zig-out/bin/issy "dist/${names[$target]}"
              chmod +x "dist/${names[$target]}"
            else
              echo "::warning::Failed to build $target — skipping"
            fi
            echo "::endgroup::"
          done

      - name: Download OpenBSD binary from openbsd-test job
        uses: actions/download-artifact@v4
        with:
          name: issy-openbsd-amd64
          path: dist/

      - name: Finalize release manifest
        run: |
          chmod +x dist/issy-openbsd-amd64

          # Full 40-char commit SHA — consumed by the in-editor update checker.
          git rev-parse HEAD > dist/commit.txt

          # Sha256 manifest over the prebuilt binaries. The auto-update
          # path fetches this, verifies its Ed25519 signature, and then
          # hashes the downloaded binary against it.
          (cd dist && sha256sum issy-* > sha256sums.txt)

          ls -lh dist/

      - name: Sign sha256sums.txt
        env:
          UPDATE_SIGNING_KEY: ${{ secrets.UPDATE_SIGNING_KEY }}
        run: |
          if [ -z "${UPDATE_SIGNING_KEY:-}" ]; then
            echo "::warning::UPDATE_SIGNING_KEY secret is not set — auto-update"\
                 " signature will be missing from this release. Run" \
                 " 'zig build keygen' locally and add the printed PEM as" \
                 " repo Settings → Secrets and variables → Actions →" \
                 " UPDATE_SIGNING_KEY."
            exit 0
          fi
          tmp=$(mktemp --suffix=.pem)
          trap 'rm -f "$tmp"' EXIT
          printf '%s\n' "$UPDATE_SIGNING_KEY" > "$tmp"
          openssl pkeyutl -sign -inkey "$tmp" -rawin \
            -in dist/sha256sums.txt -out dist/sha256sums.txt.sig
          echo "Signed sha256sums.txt ($(stat -c%s dist/sha256sums.txt.sig) bytes)"

      - name: Stage manpage
        run: cp issy.1 dist/issy.1

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          gh release create latest \
            --title "Latest Build" \
            --notes "Automated build from commit \`$(git rev-parse --short HEAD)\` on $(date -u +%Y-%m-%d).

          **Install (Linux, macOS, OpenBSD):**
          \`\`\`
          curl -sSL https://raw.githubusercontent.com/davidemerson/issy/main/install.sh | sh
          \`\`\`

          Installs to \`~/.local/bin/issy\`, verifies the Ed25519 signature on the release manifest, and seeds \`~/.issyrc\` with commented defaults. See the [README](https://github.com/davidemerson/issy#install) for details." \
            --latest \
            dist/*
