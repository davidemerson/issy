name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2

      - name: Unit tests
        run: zig build test

      - name: Build
        run: zig build

      - name: Integration tests
        run: |
          sudo apt-get install -y expect
          bash tests/run_tests.sh

  release:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2

      - name: Build all targets
        run: |
          mkdir -p dist

          targets="x86_64-linux-gnu aarch64-linux-gnu x86_64-macos aarch64-macos x86_64-openbsd"
          for target in $targets; do
            echo "Building $target..."
            zig build -Dtarget=$target -Doptimize=ReleaseSafe

            # Determine output name
            case "$target" in
              x86_64-linux-gnu)   name="issy-linux-amd64" ;;
              aarch64-linux-gnu)  name="issy-linux-arm64" ;;
              x86_64-macos)       name="issy-macos-amd64" ;;
              aarch64-macos)      name="issy-macos-arm64" ;;
              x86_64-openbsd)     name="issy-openbsd-amd64" ;;
            esac

            cp zig-out/bin/issy "dist/$name"
            chmod +x "dist/$name"
          done

          ls -lh dist/

      - name: Package .deb and .rpm
        run: |
          sudo gem install fpm --no-document

          VERSION="0.1.0"

          # Compress man page
          gzip -k issy.1

          # Linux amd64
          fpm -s dir -t deb \
            -n issy -v "$VERSION" \
            -a amd64 \
            --description "A minimal text editor" \
            --license ISC \
            --category editors \
            --maintainer "David Emerson" \
            --url "https://github.com/davidemerson/issy" \
            dist/issy-linux-amd64=/usr/bin/issy \
            issy.1.gz=/usr/share/man/man1/issy.1.gz

          fpm -s dir -t rpm \
            -n issy -v "$VERSION" \
            -a x86_64 \
            --description "A minimal text editor" \
            --license ISC \
            --category "Applications/Editors" \
            --maintainer "David Emerson" \
            --url "https://github.com/davidemerson/issy" \
            dist/issy-linux-amd64=/usr/bin/issy \
            issy.1.gz=/usr/share/man/man1/issy.1.gz

          # Linux arm64
          fpm -s dir -t deb \
            -n issy -v "$VERSION" \
            -a arm64 \
            --description "A minimal text editor" \
            --license ISC \
            --category editors \
            --maintainer "David Emerson" \
            --url "https://github.com/davidemerson/issy" \
            dist/issy-linux-arm64=/usr/bin/issy \
            issy.1.gz=/usr/share/man/man1/issy.1.gz

          fpm -s dir -t rpm \
            -n issy -v "$VERSION" \
            -a aarch64 \
            --description "A minimal text editor" \
            --license ISC \
            --category "Applications/Editors" \
            --maintainer "David Emerson" \
            --url "https://github.com/davidemerson/issy" \
            dist/issy-linux-arm64=/usr/bin/issy \
            issy.1.gz=/usr/share/man/man1/issy.1.gz

          # Move packages to dist/
          mv *.deb dist/
          mv *.rpm dist/

          # Copy man page
          cp issy.1 dist/issy.1

          ls -lh dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing 'latest' release if it exists
          gh release delete latest --yes 2>/dev/null || true
          git tag -d latest 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          # Create new release
          gh release create latest \
            --title "Latest Build" \
            --notes "Automated build from the latest commit on main.

          Built from commit $(git rev-parse --short HEAD) on $(date -u +%Y-%m-%d).

          **Install:**
          - Debian/Ubuntu: \`sudo dpkg -i issy_0.1.0_amd64.deb\`
          - RHEL/Fedora: \`sudo rpm -i issy-0.1.0-1.x86_64.rpm\`
          - macOS/OpenBSD: \`chmod +x issy-* && mv issy-* /usr/local/bin/issy\`" \
            --latest \
            dist/*
