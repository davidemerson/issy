name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ZIG_VERSION: "0.15.2"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ~/zig
          key: zig-x86_64-linux-${{ env.ZIG_VERSION }}

      - name: Install Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          curl -L -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          mkdir -p ~/zig
          tar xf zig.tar.xz -C ~/zig --strip-components=1

      - name: Add Zig to PATH
        run: echo "$HOME/zig" >> $GITHUB_PATH

      - name: Unit tests
        run: zig build test

      - name: Build
        run: zig build

      - name: Integration tests
        run: |
          sudo apt-get install -y -qq expect
          bash tests/run_tests.sh

  release:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ~/zig
          key: zig-x86_64-linux-${{ env.ZIG_VERSION }}

      - name: Install Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          curl -L -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          mkdir -p ~/zig
          tar xf zig.tar.xz -C ~/zig --strip-components=1

      - name: Add Zig to PATH
        run: echo "$HOME/zig" >> $GITHUB_PATH

      - name: Build all targets
        run: |
          mkdir -p dist

          declare -A names
          names[x86_64-linux-gnu]="issy-linux-amd64"
          names[aarch64-linux-gnu]="issy-linux-arm64"
          names[x86_64-macos]="issy-macos-amd64"
          names[aarch64-macos]="issy-macos-arm64"
          names[x86_64-openbsd]="issy-openbsd-amd64"

          for target in x86_64-linux-gnu aarch64-linux-gnu x86_64-macos aarch64-macos x86_64-openbsd; do
            echo "::group::Building $target"
            if zig build -Dtarget=$target -Doptimize=ReleaseSafe; then
              cp zig-out/bin/issy "dist/${names[$target]}"
              chmod +x "dist/${names[$target]}"
            else
              echo "::warning::Failed to build $target — skipping"
            fi
            echo "::endgroup::"
          done

          ls -lh dist/

      - name: Package .deb and .rpm
        run: |
          sudo gem install fpm --no-document

          VERSION="0.1.0"
          gzip -k issy.1

          # amd64
          fpm -s dir -t deb -n issy -v "$VERSION" -a amd64 \
            --description "A minimal text editor" --license ISC \
            --category editors --maintainer "David Emerson" \
            --url "https://github.com/davidemerson/issy" \
            dist/issy-linux-amd64=/usr/bin/issy \
            issy.1.gz=/usr/share/man/man1/issy.1.gz

          fpm -s dir -t rpm -n issy -v "$VERSION" -a x86_64 \
            --description "A minimal text editor" --license ISC \
            --category "Applications/Editors" --maintainer "David Emerson" \
            --url "https://github.com/davidemerson/issy" \
            dist/issy-linux-amd64=/usr/bin/issy \
            issy.1.gz=/usr/share/man/man1/issy.1.gz

          # arm64
          fpm -s dir -t deb -n issy -v "$VERSION" -a arm64 \
            --description "A minimal text editor" --license ISC \
            --category editors --maintainer "David Emerson" \
            --url "https://github.com/davidemerson/issy" \
            dist/issy-linux-arm64=/usr/bin/issy \
            issy.1.gz=/usr/share/man/man1/issy.1.gz

          fpm -s dir -t rpm -n issy -v "$VERSION" -a aarch64 \
            --description "A minimal text editor" --license ISC \
            --category "Applications/Editors" --maintainer "David Emerson" \
            --url "https://github.com/davidemerson/issy" \
            dist/issy-linux-arm64=/usr/bin/issy \
            issy.1.gz=/usr/share/man/man1/issy.1.gz

          mv *.deb *.rpm dist/
          cp issy.1 dist/issy.1
          ls -lh dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          gh release create latest \
            --title "Latest Build" \
            --notes "Automated build from commit \`$(git rev-parse --short HEAD)\` on $(date -u +%Y-%m-%d).

          **Install:**
          - Debian/Ubuntu: \`sudo dpkg -i issy_0.1.0-1_amd64.deb\`
          - RHEL/Fedora: \`sudo rpm -i issy-0.1.0-1.x86_64.rpm\`
          - macOS: \`xattr -d com.apple.quarantine issy-macos-arm64 && chmod +x issy-macos-arm64 && sudo mv issy-macos-arm64 /usr/local/bin/issy\`" \
            --latest \
            dist/*
